    const tx = 70;          // left padding
    const ty = H / 2;       // vertically centered (root.x = 0 in the layout)
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(1));
  }
  // Backward-compat alias so any remaining call sites still work.
  const centerRootAtTop = centerRootAtLeft;

  // --- detail card
  function showCard(p) {
    const card = document.getElementById("card");
    if (!p) {
      card.innerHTML = `<p class="empty-hint">Click any <strong>name</strong> in the tree to see that person's details here. Click the <span class="chev">▶</span> chevron to expand a branch, or <span class="chev">▼</span> to collapse it.</p>`;
      return;
    }
    const pidChips = [];
    if (p.fam_pid) pidChips.push(`<span class="pid-chip">${p.fam_pid}</span>`);
    if (p.ens_pid && p.ens_pid !== p.fam_pid) pidChips.push(`<span class="pid-chip">${p.ens_pid}</span>`);
    const wikitree = p.wikitree_url ? `<a href="${p.wikitree_url}" target="_blank" rel="noopener">${p.wikitree_id || "WikiTree profile"}</a>` : (p.wikitree_id || "");
    // 2026-05-29 Stage 3: distinct ENSLAVER vs INHERITANCE-CHAIN tag.
    const eTag = (() => {
      if (!p.is_enslaver) return "";
      if (p.evidence_status === "inheritance-chain")
        return '<span class="e-tag e-tag-inheritance" title="Descendants documented as enslavers; primary source for this person not yet recovered.">INHERITANCE CHAIN</span>';
      return '<span class="e-tag">ENSLAVER</span>';
    })();
    let h = `<h2>${escapeHtml(p.name || "(unnamed)")}${eTag}</h2>`;
    h += `<div class="subline">${pidChips.join(" ")}${p.sex ? "  ·  " + escapeHtml(p.sex) : ""}${p.residence_bucket ? "  ·  " + (RES_LABELS[p.residence_bucket] || p.residence_bucket) : ""}${p.generation != null ? "  ·  G" + p.generation : ""}</div>`;

    // Branch / sub-branch / lineage line — surfaces the new ANCESTRY structure.
    const branchParts = [];
    if (p.branch) {
      const subPart = p.sub_branch ? ` → ${escapeHtml(p.sub_branch)}` : "";
      branchParts.push(`<strong>${escapeHtml(p.branch)}${subPart}</strong> branch`);
    }
    if (p.lineage) branchParts.push(escapeHtml(p.lineage));
    if (branchParts.length) {
      h += `<div class="subline" style="margin-top:-6px;">${branchParts.join("  ·  ")}</div>`;
    }

    // Enslaved-persons section, surfaced first when present so the project's subjects lead the card.
    const named = p.enslaved_persons || [];
    const unnamed = p.unnamed_groups || [];
    if (p.is_enslaver && (named.length || unnamed.length)) {
      const total = (p.enslaved_total_count || 0);
      h += `<div class="ep-section">`;
      h += `<h3>People enslaved by this person  ·  ${total} ${total === 1 ? "person" : "people"} matched</h3>`;
      if (named.length) {
        h += `<ul class="ep-list">`;
        for (const e of named) {
          const yr = e.year ? `b. ${e.year}` : "";
          const meta = [e.role, e.event_type, e.location, e.date_of_record, e.race, e.age].filter(s => s && String(s).trim()).join(" · ");
          let nameHtml;
          if (e.profile_url && e.profile_url.startsWith("http")) {
            nameHtml = `<a href="${escapeHtml(e.profile_url)}" target="_blank" rel="noopener">${escapeHtml(e.name)}</a>`;
          } else {
            nameHtml = escapeHtml(e.name);
          }
          let tag = "";
          if (e.linkage_kind === "subsequent" && e.primary_enslaver_id) {
            tag = `<span class="ep-tag ep-tag-sub">inherited from ${e.primary_enslaver_id}</span>`;
          } else if (e.subsequent_enslaver_id) {
            tag = `<span class="ep-tag ep-tag-passed">later passed to ${e.subsequent_enslaver_id}</span>`;
          }
          h += `<li><div class="ep-name">${nameHtml}<span class="ep-pid">${e.person_id}</span>${tag}</div>`;
          if (meta || yr) h += `<span class="ep-meta">${escapeHtml([yr, meta].filter(s => s).join("  ·  "))}</span>`;
          h += `</li>`;
        }
        h += `</ul>`;
      } else {
        h += `<p class="ep-empty">No individually named persons matched yet — see unnamed group(s) below.</p>`;
      }
      if (unnamed.length) {
        h += `<ul class="ug-list">`;
        for (const g of unnamed) {
          const detail = [g.record_type, g.event_date || g.document_date, g.grouping_language].filter(s => s).join(" · ");
          h += `<li><span class="ug-num">+ ${g.total} unnamed</span> in ${escapeHtml(detail || g.group_id)} <span class="ep-pid">${g.group_id}</span></li>`;
        }
        h += `</ul>`;
      }
      h += `</div>`;
    } else if (p.is_enslaver) {
      // 2026-05-29 Stage 3: distinguish inheritance-chain copy from
      // standard "no matched persons yet" empty state.
      if (p.evidence_status === "inheritance-chain") {
        h += `<div class="ep-section"><h3>Inheritance chain</h3><p class="ep-empty">Primary source for this person's own enslaved persons not yet recovered. Documented via descendants' records — see the linked sons / heirs on the tree.</p></div>`;
      } else {
        h += `<div class="ep-section"><h3>People enslaved by this person</h3><p class="ep-empty">No matched persons attached yet — names are added as Active-sheet linkages are confirmed.</p></div>`;
      }
    }

    h += "<dl>";
    h += dlPair("Birth", joinNonempty([p.birth_date, p.birth_place]));
    h += dlPair("Baptism", joinNonempty([p.baptism_date, p.baptism_place]));
    h += dlPair("Marriage", joinNonempty([p.marriage_date, p.marriage_place]));
    h += dlPair("Death", joinNonempty([p.death_date, p.death_place]));
    h += dlPair("Burial", joinNonempty([p.burial_date, p.burial_place, p.burial_location]));
    h += dlPair("Residence", p.residence_primary);
    h += dlPair("Occupation", p.occupation);
    h += dlPair("Father", p.father_text);
    h += dlPair("Mother", p.mother_text);
    h += dlPair("Spouse", p.spouse_text);
    h += dlPair("Children (text)", p.children_summary);
    h += dlPair("WikiTree", wikitree);
    if (p.is_enslaver) {
      h += dlPair("Notable records", p.notable_records);
      h += dlPair("Will / probate", p.will_probate);
    }
    h += dlPair("Notes", p.notes);
    h += dlPair("Sources", p.sources);
    h += "</dl>";
    card.innerHTML = h;
  }

  function dlPair(k, v) {
    if (!v || !String(v).trim()) return "";
    return `<dt>${k}</dt><dd>${escapeHtml(String(v))}</dd>`;
  }

  function joinNonempty(parts) { return parts.filter(p => p && String(p).trim()).join(", "); }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // --- toolbar wiring
  // 2026-05-29 Stage 9: expand-all extracted to a reusable helper so the
  // Only-Enslavers filter + Enslaved-view toggle can call it. Without
  // expansion, the d3.tree layout doesn't include enslavers (they live
  // inside collapsed subtrees by default) and the filter would hide them.
  function expandAll(d) {
    if (d._children) { d.children = d._children; d._children = null; }
    if (d.children) d.children.forEach(expandAll);
  }
  document.getElementById("btn-expand").addEventListener("click", () => {
    expandAll(root);
    update(root);
  });
  document.getElementById("btn-collapse").addEventListener("click", () => {
    applyDefaultCollapse(root);
    update(root);
    // 2026-05-29: Reset view fits the default-collapsed tree to the viewport.
    // 2026-05-30 (Chris): bumped from 50ms → 450ms. The 50ms timeout fired
    // while D3's exit transitions (duration: 400ms) were still in flight, so
    // nodeLayer.getBBox() inside fit() returned the bounding box of the FULL
    // expanded tree (including the just-collapsed descendants animating
    // toward their parents before removal). Result: viewport sized for the
    // old expanded tree, then the smaller post-reset tree ended up
    // off-screen. Wait for the exit transitions to complete before measuring.
    setTimeout(fit, 450);
  });
  document.getElementById("btn-fit").addEventListener("click", fit);

  const btnColor = document.getElementById("btn-color-mode");
  btnColor.addEventListener("click", () => {
    colorMode = (colorMode === "branch") ? "residence" : "branch";
    btnColor.textContent = "Color: " + (colorMode === "branch" ? "Branch" : "Residence");
    renderLegend();
    // Recolor existing circles without re-laying out the tree
    nodeLayer.selectAll("g.node").each(function (d) {
      const sel = d3.select(this);
      sel.select("circle.descendant-circle").style("fill", nodeColorVar(d.data.data));
      // Recolor every spouse circle (multi-spouse support 2026-05-29)
      const spouses = d.data.spouses || [];
      sel.selectAll("circle.spouse-circle").each(function() {
        const i = +this.getAttribute("data-spouse-i") || 0;
        if (spouses[i]) d3.select(this).style("fill", nodeColorVar(spouses[i]));
      });
    });
  });

  const btnEns = document.getElementById("btn-only-enslavers");
  btnEns.addEventListener("click", () => {
    onlyEnslaverFilter = !onlyEnslaverFilter;
    btnEns.classList.toggle("active", onlyEnslaverFilter);
    // Stage 9: when turning the filter ON, expand all subtrees so the
    // filter can find enslavers hidden under collapsed branches.
    if (onlyEnslaverFilter) expandAll(root);
    update(root);
  });

  // 2026-05-29 Stage 9: view-mode toggle wiring.
  const btnViewFamily = document.getElementById("btn-view-family");
  const btnViewEnslaved = document.getElementById("btn-view-enslaved");
  function setViewMode(mode) {
    if (viewMode === mode) return;
    viewMode = mode;
    btnViewFamily.classList.toggle("active", mode === "family");
    btnViewEnslaved.classList.toggle("active", mode === "enslaved");
    // Update search-box placeholder so the corpus switch is discoverable.
    searchInput.placeholder = mode === "enslaved"
      ? "Search enslaved-person names…"
      : "Search by name or PID…";
    // Stage 9 fix: expand-all on entry into Enslaved view so the filter
    // can find enslavers across collapsed subtrees. On return to Family
    // view, collapse back to the default depth so the user gets a clean
    // starting view rather than an unwieldy fully-expanded tree.
    if (mode === "enslaved") {
      expandAll(root);
    } else {
      applyDefaultCollapse(root);
    }
    // Re-render labels — the rect.label-bg also resizes on update.
    nodeLayer.selectAll("g.label-group").remove();
    // Trigger a full re-enter of nodes (so spouses/labels rebuild per mode).
    nodeLayer.selectAll("g.node").remove();
    clearSearchHits();
    searchInput.value = "";
    update(root);
  }
  btnViewFamily.addEventListener("click", () => setViewMode("family"));
  btnViewEnslaved.addEventListener("click", () => setViewMode("enslaved"));
  // 2026-05-29 Stage 4: search with hit array, prev/next nav, auto-pan to hit.
  // Replaces the previous "highlight everything matching + hope user finds it"
  // pattern that was useless at low zoom or when the hit was off-screen.
  let currentHits = [];        // array of node-tree-data objects (d.data) that matched
  let currentHitIndex = -1;
  const searchInput = document.getElementById("search");
  const hitCountEl  = document.getElementById("hit-count");
  const hitPrevBtn  = document.getElementById("hit-prev");
  const hitNextBtn  = document.getElementById("hit-next");

  function clearSearchHits() {
    currentHits = [];
    currentHitIndex = -1;
    hitCountEl.textContent = "";
    hitCountEl.classList.remove("has-hits", "no-hits");
    hitPrevBtn.disabled = true;
    hitNextBtn.disabled = true;
    nodeLayer.selectAll("g.node").classed("search-hit", false).classed("search-hit-current", false);
  }

  function updateHitCountUI() {
    if (currentHits.length === 0) {
      hitCountEl.textContent = searchInput.value.trim() ? "no matches" : "";
      hitCountEl.classList.toggle("no-hits", !!searchInput.value.trim());
      hitCountEl.classList.remove("has-hits");
      hitPrevBtn.disabled = true;
      hitNextBtn.disabled = true;
    } else {
      hitCountEl.textContent = `${currentHitIndex + 1} of ${currentHits.length}`;
      hitCountEl.classList.add("has-hits");
      hitCountEl.classList.remove("no-hits");
      hitPrevBtn.disabled = currentHits.length < 2;
      hitNextBtn.disabled = currentHits.length < 2;
    }
  }

  // Pan + zoom the SVG so the given node's screen position is centered.
  // Uses d3.zoom transform animation. Pulls the current x/y from the rendered
  // <g.node> via its data layout coords (d.x, d.y in tree-layout space → mapped
  // by the LTR transform into screen space). Target zoom = 1.4 (close enough
  // to read the label + immediate kin).
  function panToTreeNode(treeNode) {
    if (!treeNode) return;
    const TARGET_K = 1.4;
    // tree layout uses (d.x, d.y) but the rendered SVG translates them as
    // (d.y, d.x) in LTR mode (see renderNodes — translate(d.y, d.x)).
    const nodeScreenX = treeNode.y;
    const nodeScreenY = treeNode.x;
    const W = svg.node().clientWidth;
    const H = svg.node().clientHeight;
    const tx = W / 2 - nodeScreenX * TARGET_K;
    const ty = H / 2 - nodeScreenY * TARGET_K;
    svg.transition().duration(450)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(TARGET_K));
  }

  // After a render, find the d3-hierarchy node whose data.id matches the
  // payload-person id. Used by jumpToHit so we can map currentHits (which
  // hold payload-people) to laid-out tree nodes.
  function findTreeNodeById(id) {
    let found = null;
    nodeLayer.selectAll("g.node").each(function (d) {
      if (!found && d.data && d.data.id === id) found = d;
    });
    return found;
  }

  function highlightCurrentHit() {
    nodeLayer.selectAll("g.node").classed("search-hit-current", false);
    if (currentHitIndex < 0 || !currentHits[currentHitIndex]) return;
    const hitId = currentHits[currentHitIndex].id;
    // Locate the rendered tree-node for the current hit
    const treeNode = findTreeNodeById(hitId);
    nodeLayer.selectAll("g.node").classed("search-hit-current", function (d) {
      return d.data && d.data.id === hitId;
    });
    // 2026-05-29 Stage 4 fix #4: raise the current-hit <g.node> to last in
    // SVG document order so its label paints over any colliding neighbor
    // labels. SVG has no z-index; raise() = appendChild = paints last = on top.
    nodeLayer.selectAll("g.node.search-hit-current").raise();
    panToTreeNode(treeNode);
    // Also surface its detail card so the researcher gets full context
    if (currentHits[currentHitIndex].data) showCard(currentHits[currentHitIndex].data);
  }

  function jumpToHit(idx) {
    if (currentHits.length === 0) return;
    // wrap-around
    currentHitIndex = ((idx % currentHits.length) + currentHits.length) % currentHits.length;
    updateHitCountUI();
    highlightCurrentHit();
  }

  // 2026-05-29 Stage 4 fix: name match is WHOLE-WORD (regex \bQ\b, case-i).
  // Previously substring .includes() leaked: searching "william" matched names
  // like "Cornelius Couwenhoven (#318; m. Helena Williamson)" because
  // "William" is a prefix of "Williamson". Whole-word match treats each
  // name as a sequence of words and the query must match a complete word.
  // PIDs (e.g. cp_ens_059) stay substring — they aren't natural language
  // and partial-PID lookup ("059") is a useful researcher shortcut.
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  // 2026-05-29 Stage 4 fix #2: strip (m. ...) marriage-shorthand paren groups
  // from the search corpus so "william" doesn't surface spouses.
  // Preserved: nicknames like "Hermanus (Harmen)" / "Matthias (Martin)",
  // location tags like "(of NJ)", disambiguators like "(Sr., of South Brunswick)".
  // Only paren groups containing the literal "m. " (m, period, space — the
  // genealogical marriage abbreviation) get stripped.
  //
  // 2026-05-29 Stage 4 fix #3: search corpus now includes the workbook's
  // name_variations field (236 of 415 nodes carry one) so cross-spellings
  // like "Wolphert Gerritsen" find the canonical "Wolphert Gerritsz".
  function nameSearchCorpus(name, variations) {
    let s = (name || "") + " " + (variations || "");
    return s.replace(/\(\s*[^)]*\bm\.\s+[^)]*\)/g, "").replace(/\s+/g, " ").trim();
  }
  // 2026-05-29 Stage 4 fix #3: Dutch/English given-name equivalences.
  // Every list is a single equivalence-class — any member matches any other.
  // Curated for the Cowenhoven NJ corpus; extend conservatively, only
  // include pairs that are TRUE given-name equivalents (not patronymics,
  // not coincidental phonetic similarity). Researchers can add pairs by
  // editing this list — no other code change required.
  const NAME_EQUIVS = [
    ["william", "willem", "wilhelmus"],
    ["john", "jan", "johannes", "johan", "hans", "johanes"],
    ["peter", "pieter", "petrus"],
    ["jacob", "jacobus", "james"],
    ["cornelius", "cornelis"],
    ["garret", "garrett", "gerret", "gerrit", "gerard", "gerardus", "garrit"],
    ["catherine", "catharine", "catharina", "catryntje", "katherine", "katrina"],
    ["elizabeth", "elisabeth", "lysbeth", "lijsbeth", "lijsbet", "lizzie", "betty"],
    ["mary", "maria", "marytje", "marretje", "maritje"],
    ["anne", "ann", "anna", "antje", "annetje", "anneken"],
    ["margaret", "margaretha", "margriet", "margaretta", "margreta", "margrietje"],
    ["sarah", "sara"],
    ["hendrick", "henry", "hendrik", "henrick"],
    ["roelof", "ralph", "roloff", "ruliff", "roeloff", "rulif"],
    ["lewis", "lodewyck", "lodewyk", "louis"],
    ["nicholas", "nicolaas", "nicolaes", "klaas", "niclaes", "claes"],
    ["george", "joris", "jorus"],
    ["joseph", "joost"],
    ["eleanor", "helena", "lena", "elnore", "ellinor"],
    ["daniel", "daniël"],
    ["albert", "albertus"],
    ["hester", "esther"],
    ["adriaen", "adrian", "ariaen"],
    ["christine", "christina", "stijntje", "styntje"],
    ["jannetje", "janneke", "jannitje", "jane", "janet"],
    ["aeltje", "altje", "adelaide"],
    ["frans", "francis", "francois", "frank", "frances"],
    ["thomas", "tomas"],
    ["elias", "elyas"],
    ["benjamin", "benjamen"],
    ["isaac", "izaak"],
    ["abraham", "abram"],
    ["neeltje", "nelly", "nellie", "nellitje"],
    ["arent", "aaron", "arnt"],
    ["matthew", "mattheus", "matthys"],
    ["barbara", "barbe"],
    ["rachel", "rachael"],
    ["abigail", "abagail"],
  ];
  const NAME_EQUIV_INDEX = (() => {
    const idx = {};
    for (const group of NAME_EQUIVS) {
      for (const n of group) idx[n.toLowerCase()] = group;
    }
    return idx;
  })();
  function expandToken(tok) {
    return NAME_EQUIV_INDEX[tok.toLowerCase()] || [tok.toLowerCase()];
  }
  function nameWholeWordMatch(name, variations, q) {
    const corpus = nameSearchCorpus(name, variations);
    if (!corpus || !q) return false;
    const tokens = q.split(/\s+/).filter(t => t.length > 0);
    if (tokens.length === 0) return false;
    // Per-token AND: every token must match (any of its given-name variants).
    // Word-boundary \b only applied on edges that are word-characters.
    return tokens.every(tok => {
      const variants = expandToken(tok);
      const pre  = /\w/.test(tok[0])             ? "\\b" : "";
      const post = /\w/.test(tok[tok.length-1])  ? "\\b" : "";
      const alt = variants.map(escapeRegex).join("|");
      const re = new RegExp(pre + "(?:" + alt + ")" + post, "i");
      return re.test(corpus);
    });
  }
  // 2026-05-29 Stage 9: in enslaved-person view the search corpus is the
  // names of the people each enslaver held. A hit returns the ENSLAVER's
  // node (not the enslaved person — they don't have nodes of their own),
  // with their box visually highlighted.
  function enslavedPersonHit(p, q) {
    const list = p.enslaved_persons || [];
    for (const ep of list) {
      if (nameWholeWordMatch(ep.name || "", "", q)) return true;
    }
    return false;
  }
  function runSearch(q) {
    if (!q) { clearSearchHits(); return; }
    // Walk root recursively, collect all hits + expand collapsed ancestors.
    const hits = [];
    function walk(d) {
      const p = d.data && d.data.data;
      if (!p) return false;
      const id   = (p.id || "").toLowerCase();
      let hit;
      if (viewMode === "enslaved") {
        hit = enslavedPersonHit(p, q) || id.includes(q);
      } else {
        hit = nameWholeWordMatch(p.name || "", p.name_variations || "", q) || id.includes(q);
      }
      let childHit = false;
      const kids = d.children || d._children || [];
      kids.forEach(c => { if (walk(c)) childHit = true; });
      if ((hit || childHit) && d._children) { d.children = d._children; d._children = null; }
      if (hit) hits.push(d.data);  // d.data is the tree-stratify wrapper holding {id, data, spouses, ...}
      return hit || childHit;
    }
    walk(root);
    update(root);
    // After re-render: stable hit ordering by generation → birth_year → id.
    hits.sort((a, b) => {
      const ga = (a.data.generation ?? 99), gb = (b.data.generation ?? 99);
      if (ga !== gb) return ga - gb;
      const ya = (a.data.birth_year ?? 9999), yb = (b.data.birth_year ?? 9999);
      if (ya !== yb) return ya - yb;
      return String(a.id).localeCompare(String(b.id));
    });
    currentHits = hits;
    currentHitIndex = hits.length ? 0 : -1;
    // Paint subtle ring on all hits
    setTimeout(() => {
      const hitIds = new Set(hits.map(h => h.id));
      nodeLayer.selectAll("g.node").classed("search-hit", function (d) {
        return d.data && hitIds.has(d.data.id);
      });
      updateHitCountUI();
      if (currentHitIndex >= 0) highlightCurrentHit();
    }, 60);
  }

  searchInput.addEventListener("input", (e) => {
    runSearch(e.target.value.trim().toLowerCase());
  });
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (e.shiftKey) jumpToHit(currentHitIndex - 1);
      else            jumpToHit(currentHitIndex + 1);
    } else if (e.key === "Escape") {
      searchInput.value = "";
      clearSearchHits();
    }
  });
  hitPrevBtn.addEventListener("click", () => jumpToHit(currentHitIndex - 1));
  hitNextBtn.addEventListener("click", () => jumpToHit(currentHitIndex + 1));

  update(root);
  // 2026-05-29: initial load now fits the default-collapsed tree to the
  // viewport — at scale 1.0 the G3 column would extend past the right edge
  // (GENERATION_HEIGHT=900 × 2 generations from root = 1800px).
  setTimeout(fit, 80);
})();
</script>
</body>
</html>
